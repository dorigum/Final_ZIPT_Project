services:
  # ── Spring Boot 백엔드 ──────────────────
  zipt-backend:
    image: hyejinworld/zipt-backend:latest
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      OAUTH2_REDIRECT_URI: https://zipt.store/oauth/redirect
      SPRING_DATA_REDIS_HOST: zipt-redis
    depends_on:
      zipt-mysql:
        condition: service_healthy
      zipt-redis:
        condition: service_started
    networks:
      - zipt-network

  # ── MySQL 8.0 ────────────────────────────────
  zipt-mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_USER: zipt
      MYSQL_PASSWORD: zipt1234
      MYSQL_ROOT_PASSWORD: zipt_test_dummy
      MYSQL_DATABASE: zipt
      MYSQL_CHARSET: utf8mb4
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zipt-network
    restart: "unless-stopped"

  # ── Redis 7.2 ────────────────────────────────
  zipt-redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - zipt-network
    restart: "unless-stopped"

  # ════════════════════════════════════════════
  # RAG 개발 시점에 주석 해제
  # ════════════════════════════════════════════

  zipt-postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: zipt_vector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zipt_test_dummy
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - zipt-network
    restart: "unless-stopped"

  # ── Prometheus ────────────────────────────────
  zipt-prometheus:
    image: prom/prometheus:latest
    container_name: zipt-prometheus
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - zipt-backend
    networks:
      - zipt-network
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────
  zipt-grafana:
    image: grafana/grafana:10.4.0
    container_name: zipt-grafana
    ports:
      - "80:3000"   # ← 80 포트로 변경 (grafana.zipt.store 접속용)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: zipt1234
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - zipt-prometheus
    networks:
      - zipt-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  pg-data:      # PostgreSQL 데이터 영구 저장용 볼륨
  grafana-data: # Grafana 대시보드 설정 영구 저장

networks:
  zipt-network:
    driver: bridge