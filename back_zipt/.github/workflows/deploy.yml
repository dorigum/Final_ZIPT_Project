# ════════════════════════════════════════════
# ZIPT 백엔드 배포
# 트리거: dev 브랜치 push
# ════════════════════════════════════════════

name: Back Deploy

on:
  push:
    branches: [ dev ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 21 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 캐시
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      #3-1 빌드 전, GitHub Secrets에서 실제 키값들을 가져와 파일로 생성
      - name: Create application-dev.yml from Secrets
        env:
          APP_YML: ${{ secrets.APPLICATION_DEV_YML }}
        run: |
          mkdir -p src/main/resources
          printf '%s\n' "$APP_YML" > src/main/resources/application-dev.yml

      # 4. Gradle 빌드
      - name: Build with Gradle
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      # 5. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      # 6. Docker 이미지 빌드 + Push
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/zipt-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/zipt-backend:latest

      # 7. docker-compose.yml을 EC2로 직접 전송 (private 레포)
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml,monitoring"
          target: "/home/ubuntu/zipt"

      # 8. EC2 배포 (SSH) 수정 - 202607006
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/zipt
            
            # 최신 이미지 pull
            docker pull ${{ secrets.DOCKER_USERNAME }}/zipt-backend:latest
            
            # 기존 컨테이너 중지 및 제거
            docker-compose stop zipt-backend
            docker-compose rm -f zipt-backend
            
            # 새 컨테이너 실행
            docker-compose up -d zipt-mysql zipt-redis zipt-postgres
            docker-compose up -d --no-deps zipt-backend
            docker-compose up -d --no-deps zipt-prometheus
            docker-compose up -d --no-deps zipt-grafana

            # 불필요한 이미지 정리
            docker image prune -f